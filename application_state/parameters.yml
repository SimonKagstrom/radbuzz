# This is the list of all possible parameters
cpp_includes:
  - "wgs84_to_osm_point.hh"


parameters:
  current_icon_hash:
    type: uint32_t

  distance_to_next:
    type: uint32_t

  next_street:
    type: std::string

  speed:
    type: uint8_t

  max_speed:
    type: uint8_t

  controller_temperature:
    type: uint8_t

  motor_temperature:
    type: uint8_t

  battery_millivolts:
    type: uint16_t

  # In percent, 0..100
  battery_soc:
    type: uint8_t

  # Number of battery cells in series, used to calculate cell voltage from millivolts (14s3p etc)
  battery_series:
    type: uint8_t

  current_power_w:
    type: uint16_t

  wh_consumed:
    type: uint32_t

  wh_regenerated:
    type: uint32_t

  # In meters
  distance_traveled:
    type: uint32_t

  pixel_position:
    type: struct Point
